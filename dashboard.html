<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astro Packages</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
  <header class="bg-pink-600 text-white p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">🌟 Astro - Every genre for everyone made easy</h1>
    <div class="flex space-x-2">
      <a href="subscribe.html" class="bg-white text-pink-600 font-semibold px-4 py-2 rounded-full hover:bg-yellow-300 transition">SUBSCRIBE NOW</a>
      <a href="login.html" class="bg-white text-pink-600 font-semibold px-4 py-2 rounded-full hover:bg-yellow-300 transition">LOG OUT</a>
    </div>
  </header>

  <div class="max-w-7xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="package-container">
    
  </div>

  <script>
    fetch('load_packages.php')
    .then(response => response.json())
    .then(data => {
      const container = document.getElementById('package-container');
      data.forEach(pkg => {
        const card = document.createElement('div');
        card.className = "bg-white rounded-xl shadow-lg overflow-hidden";

        card.innerHTML = `
            <img src="${pkg.image_url}" alt="${pkg.name}" class="w-full h-48 object-cover">
            <div class="p-6">
              <div class="flex justify-between items-start mb-4">
                <h2 class="text-xl font-bold text-gray-800">${pkg.name}</h2>
                <span class="bg-pink-500 text-white px-3 py-1 rounded-full text-sm">RM ${pkg.price}</span>
              </div>
              <p class="text-gray-600 mb-2">${pkg.description}</p>
              <p class="text-sm text-gray-500 mb-2">Contract Duration: ${pkg.contract}</p>
              <div class="flex flex-wrap gap-2 mt-4">
                ${pkg.channels.map(channel => `
                  <span class="bg-gray-200 text-sm px-2 py-1 rounded">${channel.trim()}</span>
                `).join('')}
              </div>
            </div>
        `;
        container.appendChild(card);
      });
    })
    .catch(error => {
      console.error('Error fetching packages:', error);
      document.getElementById('package-container').innerHTML = '<p class="text-red-600">Failed to load packages.</p>';
    });
  </script>
</body>
</html>
