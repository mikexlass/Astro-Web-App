    <script>
        const diveButton = document.getElementById('diveButton');
        let lastScroll = 0;

        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            const windowHeight = window.innerHeight;
            const contentHeight = document.querySelector('.content').offsetHeight;

            if (currentScroll > 100) {
                diveButton.classList.add('round');
                const newTop = currentScroll + (windowHeight / 2) - 100;
                diveButton.style.position = 'fixed';
                diveButton.style.top = `${newTop}px`;
                diveButton.style.left = '50%';
                diveButton.style.transform = `translateX(-50%)`;
            } else {
                diveButton.classList.remove('round');
                diveButton.style.position = 'absolute';
                diveButton.style.top = 'auto';
                diveButton.style.bottom = '50px';
                diveButton.style.left = '50%';
                diveButton.style.transform = 'translateX(-50%)';
            }
            lastScroll = currentScroll;
        });

        // Carousel dan pembesaran imej untuk .drama-gallery
        const dramaGallery = document.querySelector('.drama-gallery');
        const dramaImages = document.querySelectorAll('.drama-gallery img');
        let dramaIndex = 0;

        function updateActiveDramaImage() {
            dramaImages.forEach((img, index) => {
                img.classList.remove('active');
                if (index === dramaIndex) {
                    img.classList.add('active');
                }
            });
        }

        dramaGallery.addEventListener('scroll', () => {
            const scrollPosition = dramaGallery.scrollLeft;
            const imageWidth = (window.innerWidth - 80) / 5;
            dramaIndex = Math.round(scrollPosition / imageWidth);
            updateActiveDramaImage();
        });

        setInterval(() => {
            dramaIndex = (dramaIndex + 1) % (dramaImages.length - 4);
            dramaGallery.scrollTo({
                left: dramaIndex * ((window.innerWidth - 80) / 5),
                behavior: 'smooth'
            });
            updateActiveDramaImage();
        }, 3000);

        // Carousel dan pembesaran imej untuk .channel-gallery
        const channelGallery = document.querySelectorAll('.channel-gallery');
        channelGallery.forEach((gallery) => {
            const channelImages = gallery.querySelectorAll('img');
            let channelIndex = 0;

            function updateActiveChannelImage() {
                channelImages.forEach((img, index) => {
                    img.classList.remove('active');
                    if (index === channelIndex) {
                        img.classList.add('active');
                    }
                });
            }

            gallery.addEventListener('scroll', () => {
                const scrollPosition = gallery.scrollLeft;
                const imageWidth = (window.innerWidth - 80) / 5;
                channelIndex = Math.round(scrollPosition / imageWidth);
                updateActiveChannelImage();
            });

            setInterval(() => {
                channelIndex = (channelIndex + 1) % (channelImages.length - 4);
                gallery.scrollTo({
                    left: channelIndex * ((window.innerWidth - 80) / 5),
                    behavior: 'smooth'
                });
                updateActiveChannelImage();
            }, 3000);
        });
    </script>

<script>
// Video control variables
let video = document.getElementById('upinVideo');
let isPlaying = false;
let progressBar = document.getElementById('progressBar');
let timeDisplay = document.getElementById('timeDisplay');

// Check subscription before opening video
function openVideo() {
    fetch('check_session.php')
        .then(response => response.json())
        .then(data => {
            if (data.status === 'active') {
                // Set max resolution from admin
                let maxRes = data.max_resolution || '1080';
                limitResolutionOptions(maxRes);
                
                document.getElementById('videoModal').style.display = 'block';
                video.play();
                isPlaying = true;
                updateProgress();
            } else if (data.status === 'not_logged_in') {
                alert('Please login first!');
                window.location.href = 'Login.html';
            } else if (data.status === 'blocked') {
                alert('Your account has been blocked. Contact admin.');
            } else if (data.status === 'expired' || data.status === 'no_subscription') {
                alert('Please subscribe to watch!');
                window.location.href = 'choose_plan.html';
            }
        });
}

function limitResolutionOptions(maxRes) {
    let select = document.getElementById('resolutionSelect');
    let options = select.options;
    
    // Disable options above max resolution
    for (let i = 0; i < options.length; i++) {
        let resValue = options[i].value;
        if (resValue === 'auto') continue;
        
        // Compare resolution values
        let maxVal = parseInt(maxRes.replace('k', '000'));
        let optVal = parseInt(resValue.replace('k', '000'));
        
        if (optVal > maxVal) {
            options[i].disabled = true;
            options[i].style.color = '#666';
        } else {
            options[i].disabled = false;
            options[i].style.color = 'white';
        }
    }
    
    // Auto-select highest allowed resolution
    for (let i = options.length - 1; i >= 0; i--) {
        if (!options[i].disabled && options[i].value !== 'auto') {
            options[i].selected = true;
            document.getElementById('resolutionDisplay').textContent = 'Quality: ' + options[i].text;
            break;
        }
    }
}

function closeVideo() {
    document.getElementById('videoModal').style.display = 'none';
    video.pause();
    isPlaying = false;
}

function togglePlay() {
    if (video.paused) {
        video.play();
        isPlaying = true;
    } else {
        video.pause();
        isPlaying = false;
    }
}

function skipForward() {
    video.currentTime += 10;
}

function skipBackward() {
    video.currentTime -= 10;
}

function toggleMute() {
    video.muted = !video.muted;
}

function toggleFullscreen() {
    if (video.requestFullscreen) {
        video.requestFullscreen();
    }
}

function changeResolution() {
    let select = document.getElementById('resolutionSelect');
    let quality = select.value;
    document.getElementById('resolutionDisplay').textContent = 'Quality: ' + select.options[select.selectedIndex].text;
    
    let currentTime = video.currentTime;
    console.log('Switched to ' + quality);
    video.currentTime = currentTime;
}

function updateProgress() {
    if (!isPlaying) return;
    
    let percent = (video.currentTime / video.duration) * 100;
    progressBar.style.width = percent + '%';
    
    let current = formatTime(video.currentTime);
    let total = formatTime(video.duration || 0);
    timeDisplay.textContent = current + ' / ' + total;
    
    requestAnimationFrame(updateProgress);
}

function formatTime(seconds) {
    let mins = Math.floor(seconds / 60);
    let secs = Math.floor(seconds % 60);
    return mins + ':' + (secs < 10 ? '0' : '') + secs;
}

function seekVideo(event) {
    let rect = event.target.getBoundingClientRect();
    let percent = (event.clientX - rect.left) / rect.width;
    video.currentTime = percent * video.duration;
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeVideo();
});
</script>
