<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Astro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .container {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
        }
        
        h1 { 
            color: #e6007e; 
            margin-bottom: 5px;
        }
        
        .plan-summary {
            background: rgba(230,0,126,0.2);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .plan-summary h3 {
            margin: 0;
            color: white;
        }
        
        .plan-summary p {
            margin: 5px 0 0 0;
            font-size: 24px;
            font-weight: bold;
        }
        
        .qr-section {
            margin: 30px 0;
        }
        
        .qr-section p {
            margin-bottom: 15px;
            color: #aaa;
        }
        
        .qr-placeholder {
            width: 250px;
            height: 250px;
            background: white;
            margin: 0 auto;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .qr-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .bank-info {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }
        
        .pay-btn {
            background: #00c853;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-weight: 600;
        }
        
        .pay-btn:hover { 
            background: #00e676; 
        }
        
        .back-link {
            display: block;
            margin-top: 15px;
            color: #aaa;
            text-decoration: none;
        }
        
        .back-link:hover {
            color: #e6007e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Complete Payment</h1>
        
        <div class="plan-summary">
            <h3 id="planName">Standard Plan</h3>
            <p>RM<span id="planPrice">25</span>/month</p>
        </div>
        
        <div class="qr-section">
            <p>Scan QR code to pay:</p>
            <div class="qr-placeholder">
                <!-- TODO: Replace with your actual QR code image -->
                <img src="mikeqr.jpeg" alt="Bank QR Code" id="qrImage">
            </div>
            <div class="bank-info">
                DuitNow / Bank Transfer
            </div>
        </div>

        <button class="pay-btn" onclick="completePayment()">
            ✓ I've Completed Payment
        </button>
        
        <a href="choose_plan.html" class="back-link">← Change plan</a>
    </div>

    <script>
        // Load selected plan from storage
        const plan = localStorage.getItem('selectedPlan') || 'standard';
        const price = localStorage.getItem('selectedPrice') || '25';
        
        // Display plan info
        document.getElementById('planName').textContent = 
            plan.charAt(0).toUpperCase() + plan.slice(1) + ' Plan';
        document.getElementById('planPrice').textContent = price;
        
        // Check if QR image exists, if not show placeholder text
        const qrImg = document.getElementById('qrImage');
        qrImg.onerror = function() {
            this.style.display = 'none';
            this.parentElement.innerHTML = '<div style="color:#333;font-size:18px;">[Your QR Code Here]<br>Replace mikeqr.jpeg</div>';
        };

        function completePayment() {
            // Mark payment as done
            localStorage.setItem('paymentComplete', 'true');
            
            // Go to create account page (also new name)
            window.location.href = 'sign_up_new.html';
        }
    </script>
</body>
</html>
